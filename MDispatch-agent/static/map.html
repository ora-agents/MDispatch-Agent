<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>维修工实时地图</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body { margin: 0; }
        #map { width: 100vw; height: 100vh; }
        #info {
            position: fixed;
            top: 10px;
            left: 10px;
            background: white;
            padding: 10px;
            z-index: 999;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div id="info">等待维修工位置...</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const engineerId = "ENG001";

const map = L.map('map').setView([31.9319, 118.8109], 16);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);

let marker = null;

async function refreshLocation() {
    const res = await fetch(`/api/engineer/location/${engineerId}`);
    const data = await res.json();

    if (data.status !== "success") {
        document.getElementById("info").innerText = "暂无维修工位置";
        return;
    }

    const lat = data.location.latitude;
    const lon = data.location.longitude;
    const time = data.location.update_time;

    document.getElementById("info").innerText =
        `维修工：${engineerId} | 坐标：${lat}, ${lon} | 更新时间：${time}`;

    if (!marker) {
        marker = L.marker([lat, lon]).addTo(map);
        marker.bindPopup("维修工 ENG001").openPopup();
        map.setView([lat, lon], 17);
    } else {
        marker.setLatLng([lat, lon]);
        map.panTo([lat, lon]);
    }
}

refreshLocation();
setInterval(refreshLocation, 3000);
</script>

</body>
</html>
